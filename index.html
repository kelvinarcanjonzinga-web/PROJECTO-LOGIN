<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECTO LOGIN</title>
    <link rel="stylesheet" href="estilo/style.css">
    <link rel="stylesheet" href="estilos/mediaqueries.css">
</head>
<body>
    <main>

        <section id="login">

            <div id="imagem">
               
            </div>


            <div id="formulario">

                <h1>LOGIN</h1>

                <p>Seja Bem-vindo(a),faça login para acessar a sua conta e fazer as configurações no seu Ambiente!</p>

                <form 
                
                    action="login.php" method="post">

                    <p>
                        <label for="iemail">Email:</label>
                        <input type="email" name="email" id="iemail" required autocomplete="email">
                    </p>

                    <p>
                        <label for="isenha">Senha:</label>
                        <input type="password" name="senha" id="isenha" required>
                    </p>

                    <p>
                        <input type="submit" value="Entrar" id="submit">
                    </p>

                    <p>
                        <input type="reset" value="Esqueceu a senha?" id="reset">
                    </p>

                </form>

            </div>
            
        </section>

    </main>
    
</body>
</html>
